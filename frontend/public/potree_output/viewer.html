<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="utf-8">
<title>Potree Viewer</title>

<link rel="stylesheet" href="../potree/build/potree/potree.css">
<link rel="stylesheet" href="../potree/libs/jquery-ui/jquery-ui.min.css">

<script src="../potree/libs/jquery/jquery-3.1.1.min.js"></script>
<script src="../potree/libs/jquery-ui/jquery-ui.min.js"></script>
<script src="../potree/build/potree/potree.js"></script>

<style>
html, body {
  margin: 0;
  height: 100%;
}

#potree_render_area {
  width: 100%;
  height: 100%;
}
</style>

</head>

<body>

<div id="potree_render_area"></div>

<script>

const viewer = new Potree.Viewer(
  document.getElementById("potree_render_area")
);

viewer.setEDLEnabled(true);
viewer.setFOV(60);
viewer.setPointBudget(1000000);

Potree.loadPointCloud("metadata.json", "forest", e => {

  const pointcloud = e.pointcloud;

  viewer.scene.addPointCloud(pointcloud);

  viewer.fitToScreen();

});

</script>

</body>
</html>
